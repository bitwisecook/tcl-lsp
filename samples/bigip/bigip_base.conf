# Example BIG-IP base configuration fixture for highlighting and cross-links.
#
# Patterns are adapted from publicly available BIG-IP config artefacts:
# https://github.com/f5devcentral/f5-corkscrew/tree/main/tests/archive_generator/archive1/config

# Partition and auth objects
auth partition Common {
    description "Default partition"
}
auth partition foo {
    description "Application partition"
}
auth password-policy {
    lockout-duration 10
    policy-enforcement disabled
}
auth user admin {
    partition-access {
        all-partitions {
            role admin
        }
    }
    shell bash
}
auth user opsUser {
    partition-access {
        Common {
            role manager
        }
    }
    shell tmsh
}
auth radius-server /Common/system_auth_name1 {
    secret $M$mn$9uYx+bTjLD8YSGZAUEfFwHvpSDwZsL25kZxdn5NZmCI=
    server 10.200.244.1
}

# Route-domain and protocol:port defaults
net route-domain /Common/0 {
    id 0
    vlans {
        /Common/internal
        /Common/external
    }
}
net self-allow {
    defaults {
        tcp:22
        tcp:443
        udp:53
        udp:161
    }
}

# Encrypted key material
sys file ssl-key /Common/f5_api_com.key {
    passphrase $M$dw$gJ3HaeiGt0skpPsA6hli9PsO/8yo5M6FkI1CHOPiN4GgC/h5Tln6v01SC2727mtleKP9Hw/Vnwio8eOiXi4umiV+IidOxMwtZinL8WYrqX0=
    source-path file:///config/ssl/ssl.key/f5_api_com.key
}
sys diags ihealth {
    user admin
    password none
}

# LTM objects for cross-link and value-highlighting coverage
ltm node /Common/api.example.com {
    fqdn {
        address-family all
        autopopulate enabled
        name api.example.com
    }
}
ltm node /foo/app1-node {
    address 10.10.12.5%0
}

ltm snatpool /Common/snatpool_egress {
    members {
        /Common/192.0.2.200
        /Common/192.0.2.201
    }
}

ltm pool /Common/web_pool {
    members {
        /Common/api.example.com:443 {
            fqdn {
                autopopulate enabled
                name api.example.com
            }
        }
        /foo/app1-node:8080 {
            address 10.10.12.5
        }
    }
    monitor /Common/https
}

ltm pool /foo/api_pool {
    members {
        /Common/10.10.12.20:8443 {
            address 10.10.12.20
        }
    }
    monitor /Common/tcp
}

ltm virtual /Common/app_https_vs {
    destination /Common/192.0.2.10%12:443
    ip-protocol tcp
    pool /Common/web_pool
    profiles {
        /Common/http { }
        /Common/tcp { }
        /Common/clientssl { }
    }
    source 0.0.0.0/0
    source-address-translation {
        type automap
    }
}

ltm virtual /foo/app_api_vs {
    destination /foo/198.51.100.20:8443
    ip-protocol tcp
    pool /foo/api_pool
    profiles {
        /Common/http { }
        /Common/tcp { }
    }
    source-address-translation {
        pool /Common/snatpool_egress
        type snat
    }
    translate-address enabled
    translate-port enabled
}
