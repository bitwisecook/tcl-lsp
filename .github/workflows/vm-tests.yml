name: VM Tests

on:
  workflow_dispatch:

jobs:
  vm-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync Python environment
        run: uv sync --extra dev

      - name: Run VM tcltest conformance tests
        run: make test-vm
