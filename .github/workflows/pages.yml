name: Deploy Compiler Explorer to GitHub Pages

# Disabled until the repository is made public (GitHub Pages requires a public
# repo on free plans).
# on:
#   push:
#     tags: ["v*"]
on: workflow_dispatch

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync Python environment
        run: uv sync --extra dev

      - name: Build compiler explorer (CDN variant)
        run: make explorer-build-cdn

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/explorer-cdn

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
